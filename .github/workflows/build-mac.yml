name: Build macOS DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build macOS DMG (ad-hoc signed via afterPack hook)
        run: npx electron-builder --mac dmg --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify ad-hoc signature
        run: |
          APP=$(find dist -name "*.app" -maxdepth 4 | head -1)
          echo "Verifying: $APP"
          codesign -dv "$APP" 2>&1
          codesign --verify --verbose "$APP" 2>&1
          codesign -dv "$APP" 2>&1 | grep -i "adhoc" && echo "✓ Ad-hoc signature confirmed" || (echo "✗ Ad-hoc signature NOT found" && exit 1)

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Drift-macOS-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create or update GitHub Release
        run: |
          DMG=$(ls dist/*.dmg | head -1)
          FILENAME=$(basename "$DMG")
          echo "Uploading $FILENAME"
          if gh release view v1.3.1 &>/dev/null; then
            gh release upload v1.3.1 "$DMG" --clobber
          else
            gh release create v1.3.1 "$DMG" \
              --title "Drift 1.3.1 (macOS)" \
              --notes "**Ad-hoc signed** — on first launch, right-click the app and choose **Open** to bypass the unverified-developer Gatekeeper prompt. (Full notarization requires a paid Apple Developer ID.)" \
              --latest
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
